name: build-windows-exe

# 在 windows 运行器上用 PyInstaller 打出 exe。
# - 推送 tag (v*) 时：构建并发布为 GitHub Release 附件。
# - 手动触发 / 普通推送：构建并上传为 workflow 产物，可在 Actions 页面下载。
on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.6.0

      - name: 打包 exe
        run: pyinstaller --noconfirm --clean xlsx-manager.spec

      - name: 上传 workflow 产物
        uses: actions/upload-artifact@v4
        with:
          name: xlsx-manager-exe
          path: dist/xlsx-manager.exe
          if-no-files-found: error

      - name: 发布为 Release 附件 (仅 tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/xlsx-manager.exe
          fail_on_unmatched_files: true
